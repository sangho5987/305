<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>합성치사 라이브 시뮬레이션v2</title>
    <style>
        /* 실험실(현미경) 느낌의 어두운 배경 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        #status-text { font-size: 1.2rem; color: #cbd5e1; height: 30px; margin-bottom: 20px; }

        /* 현미경 뷰 컨테이너 */
        .microscope-view {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            margin: 40px auto;
            position: relative;
        }

        /* 세포 기본 디자인 (원형) */
        .cell {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 1s ease;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        /* 정상 세포: 푸른빛 */
        #normal-cell {
            background: radial-gradient(circle, #1e3a8a 0%, #0f172a 100%);
            border: 3px solid #3b82f6;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.4);
        }

        /* 암세포: 붉은빛 */
        #cancer-cell {
            background: radial-gradient(circle, #4c0519 0%, #0f172a 100%);
            border: 3px solid #e11d48;
            box-shadow: 0 0 40px rgba(225, 29, 72, 0.4);
        }

        /* 세포핵 (DNA가 있는 곳) */
        .nucleus {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem; /* DNA 이모지 크기 */
            position: relative;
            border: 1px dashed rgba(255,255,255,0.3);
        }

        /* 복구 효소(단백질) 아이콘들 */
        .enzyme {
            position: absolute;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: all 0.5s;
        }

        /* OGG1 효소 (A경로) */
        .ogg1 { top: 20px; left: 50%; transform: translateX(-50%); background-color: #10b981; }
        
        /* BRCA 효소 (B경로) */
        .brca { bottom: 20px; left: 50%; transform: translateX(-50%); background-color: #3b82f6; }
        
        /* 고장난 효소 스타일 */
        .broken { background-color: #475569 !important; color: #94a3b8 !important; text-decoration: line-through; box-shadow: none; border: 1px solid #334155; }

        /* 약물(알약) 아이콘 애니메이션 */
        .drug {
            position: absolute;
            font-size: 2rem;
            top: -50px;
            opacity: 0;
            transition: all 1s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 암세포 사멸(Apoptosis) 부르르 떠는 애니메이션 */
        @keyframes apoptosis-shake {
            0% { transform: translate(1px, 1px) rotate(0deg) scale(1); }
            10% { transform: translate(-1px, -2px) rotate(-1deg) scale(0.95); }
            20% { transform: translate(-3px, 0px) rotate(1deg) scale(0.9); }
            30% { transform: translate(3px, 2px) rotate(0deg) scale(0.85); filter: grayscale(0.5); }
            40% { transform: translate(1px, -1px) rotate(1deg) scale(0.8); }
            50% { transform: translate(-1px, 2px) rotate(-1deg) scale(0.7); }
            60% { transform: translate(-3px, 1px) rotate(0deg) scale(0.6); filter: grayscale(1); }
            70% { transform: translate(3px, 1px) rotate(-1deg) scale(0.5); }
            80% { transform: translate(-1px, -1px) rotate(1deg) scale(0.4); opacity: 0.5; }
            90% { transform: translate(1px, 2px) rotate(0deg) scale(0.2); opacity: 0.2; }
            100% { transform: scale(0); opacity: 0; display: none; }
        }

        .dead { animation: apoptosis-shake 2s forwards; }

        /* 하단 조작 버튼 */
        .controls { margin-top: 50px; }
        button {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white; border: none; padding: 15px 40px; font-size: 1.2rem;
            border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4); transition: 0.3s;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(37, 99, 235, 0.6); }
        button:disabled { background: #475569; cursor: not-allowed; box-shadow: none; transform: none; }
        
        .label { margin-top: 15px; font-weight: bold; font-size: 1.2rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <h1>🔬 세포 내 DNA 수선 시뮬레이션</h1>
    <div id="status-text">▶ 세포들이 분열하며 DNA 복제를 진행하고 있습니다.</div>

    <div class="microscope-view">
        
        <!-- 정상 세포 -->
        <div>
            <div class="cell" id="normal-cell">
                <div class="drug" id="drug-n">💊</div>
                <div class="enzyme ogg1" id="n-ogg1">OGG1 (A경로)</div>
                <div class="nucleus" id="n-dna">🧬</div>
                <div class="enzyme brca" id="n-brca">BRCA (B경로)</div>
            </div>
            <div class="label" style="color: #3b82f6;">정상 세포</div>
        </div>

        <!-- 암세포 -->
        <div>
            <div class="cell" id="cancer-cell">
                <div class="drug" id="drug-c">💊</div>
                <div class="enzyme ogg1" id="c-ogg1">OGG1 (A경로)</div>
                <div class="nucleus" id="c-dna">🧬</div>
                <!-- 암세포는 태생적으로 BRCA가 고장나 있음 -->
                <div class="enzyme brca broken" id="c-brca">BRCA 돌연변이</div>
            </div>
            <div class="label" style="color: #e11d48;">암세포</div>
        </div>

    </div>

    <div class="controls">
        <button id="action-btn" onclick="applyDrug()">🧪 OGG1 저해제 투여하기</button>
    </div>

    <script>
        const statusText = document.getElementById('status-text');
        const actionBtn = document.getElementById('action-btn');

        function applyDrug() {
            actionBtn.disabled = true;
            statusText.innerText = "▶ 약물이 세포 내로 침투하여 OGG1 효소를 공격합니다!";
            statusText.style.color = "#f59e0b";

            // 1. 약물 떨어지는 애니메이션
            document.getElementById('drug-n').style.top = "60px";
            document.getElementById('drug-n').style.opacity = "1";
            document.getElementById('drug-c').style.top = "60px";
            document.getElementById('drug-c').style.opacity = "1";

            // 2초 뒤 OGG1 마비 효과
            setTimeout(() => {
                document.getElementById('n-ogg1').classList.add('broken');
                document.getElementById('n-ogg1').innerText = "OGG1 차단됨";
                
                document.getElementById('c-ogg1').classList.add('broken');
                document.getElementById('c-ogg1').innerText = "OGG1 차단됨";

                statusText.innerText = "▶ OGG1 차단 완료! DNA 미세 손상이 누적되기 시작합니다...";
                statusText.style.color = "#ef4444";
                
                // DNA 손상 이모지로 변경
                document.getElementById('n-dna').innerText = "⚠️";
                document.getElementById('c-dna').innerText = "⚠️";
            }, 1500);

            // 4초 뒤 최종 결과 (합성치사 발동)
            setTimeout(() => {
                // 정상 세포: BRCA가 DNA를 고침
                document.getElementById('n-brca').style.transform = "translateX(-50%) scale(1.3)";
                document.getElementById('n-brca').style.backgroundColor = "#22c55e";
                document.getElementById('n-dna').innerText = "✨🧬✨"; // 복구 완료
                document.getElementById('normal-cell').style.boxShadow = "0 0 50px rgba(34, 197, 94, 0.8)";
                document.getElementById('normal-cell').style.border = "3px solid #22c55e";

                // 암세포: 고칠 방법이 없어서 사멸 (Apoptosis)
                document.getElementById('c-dna').innerText = "💥"; // 붕괴
                document.getElementById('cancer-cell').classList.add('dead'); // 부르르 떨며 사라짐

                statusText.innerHTML = "▶ <b>결과:</b> 정상 세포는 B경로로 생존! 암세포는 2중 복구 실패로 <b>사멸(합성치사)</b>했습니다!";
                statusText.style.color = "#22c55e";

                actionBtn.innerText = "🔄 다시 실험하기";
                actionBtn.disabled = false;
                actionBtn.onclick = () => location.reload();
            }, 4000);
        }
    </script>
</body>
</html>
